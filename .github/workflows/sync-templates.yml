name: Sync Product Template Only

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/product.json'

jobs:
  sync-product-json:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        child: 
          - { branch: 'store-1', name: 'Store 1' }
          - { branch: 'store-2', name: 'Store 2' }

    steps:
      - name: Checkout main branch (source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Debug - Check if product.json exists
        run: |
          echo "=== Checking files in main branch ==="
          ls -la main-source/
          ls -la main-source/templates/ || echo "Folder templates/ not found!"
          ls -la main-source/templates/product.json || echo "File product.json NOT FOUND!"

      - name: Checkout child branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.child.branch }}

      - name: Copy product.json if exists
        run: |
          mkdir -p templates
          if [ -f main-source/templates/product.json ]; then
            cp main-source/templates/product.json templates/product.json
            echo "✅ Copied product.json successfully"
          else
            echo "❌ File product.json not found in main branch!"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add templates/product.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync product.json from main [${{ matrix.child.name }}]"
            git push origin ${{ matrix.child.branch }}
          fi