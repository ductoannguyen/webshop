name: Sync Product Template Only

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/product.json'

jobs:
  sync-product-json:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        child: 
          - { branch: 'store-1', name: 'Store 1' }
          - { branch: 'store-2', name: 'Store 2' }

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Copy product.json
        run: |
          mkdir -p templates
          
          # Debug nhanh
          echo "Tìm file product.json..."
          ls main-source/templates/product.json || echo "Không tìm thấy!"
          
          # Copy file
          cp main-source/templates/product.json templates/product.json
          echo "✅ Đã copy product.json"

      - name: Checkout & Push to child branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add templates/product.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync product.json from main [${{ matrix.child.name }}]"
            git push origin ${{ matrix.child.branch }}
          fi