name: Sync Product Template Only

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/product*.json'

jobs:
  sync-product-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ← Thêm dòng này

    strategy:
      matrix:
        child: 
          - { branch: 'store-1', name: 'Store 1' }
          - { branch: 'store-2', name: 'Store 2' }

    steps:
      - name: Checkout child branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.child.branch }}

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Copy product.json
        run: |
          mkdir -p templates
          cp main-source/templates/product.json templates/product.json
          echo "✅ Copied product.json"

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add templates/product.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync product.json from main [${{ matrix.child.name }}]"
            git push origin ${{ matrix.child.branch }}
          fi