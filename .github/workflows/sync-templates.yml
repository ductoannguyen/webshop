name: Sync Product Template Only - Debug

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/product.json'

jobs:
  sync-product-json:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        child: 
          - { branch: 'store-1', name: 'Store 1' }
          - { branch: 'store-2', name: 'Store 2' }

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: 🔍 FULL DEBUG - List all files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in main-source ==="
          ls -la main-source/
          echo "=== Templates folder ==="
          ls -la main-source/templates/ || echo "No templates folder!"
          echo "=== Check product.json specifically ==="
          ls -la main-source/templates/product.json || echo "product.json NOT FOUND"
          echo "=== Search for any .json files ==="
          find main-source -name "*.json" | head -10

      - name: Checkout child branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.child.branch }}

      - name: Copy product.json
        run: |
          mkdir -p templates
          if [ -f main-source/templates/product.json ]; then
            cp main-source/templates/product.json templates/product.json
            echo "✅ Successfully copied product.json"
          else
            echo "❌ Still cannot find product.json"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add templates/product.json
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Sync product.json from main [${{ matrix.child.name }}]"
            git push origin ${{ matrix.child.branch }}
          fi